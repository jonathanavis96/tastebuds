services:
  tastebuds:
    build: .
    ports:
      - "8094:8094"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    extra_hosts:
      # lets the container reach the Ollama container published on the host (:11434)
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8094/api/profiles"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
